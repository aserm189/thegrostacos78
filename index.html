<!DOCTYPE html>
<html>
<head>
  <title>Surprise spéciale 💍</title>
  <style>
    body {
      text-align: center;
      margin-top: 50px;
      font-family: Arial, sans-serif;
      background-color: black;
      color: white;
    }
    #specialImage {
      display: none;
      width: 400px;
      margin-top: 20px;
      border: 5px solid white;
      border-radius: 10px;
    }
    #specialText {
      display: none;
      font-size: 28px;
      font-weight: bold;
      margin-top: 20px;
      color: #ffcc00;
    }
    button {
      padding: 15px 30px;
      font-size: 22px;
      cursor: pointer;
      background-color: #222;
      color: white;
      border: 2px solid #ffcc00;
      border-radius: 8px;
    }
    button:hover {
      background-color: #444;
    }
  </style>
</head>
<body>

<h1>Ose cliquer ici… 😏</h1>
<button onclick="showSpecial()">Clique !</button>

<img id="specialImage" src="https://in.pinterest.com/pin/tk78--1092404453359642632/">
<div id="specialText">Veux‑tu m'épouser ? 💍</div>

<script>
function showSpecial() {
  document.getElementById("specialImage").style.display = "block";
  document.getElementById("specialText").style.display = "block";
}
</script>

</body>
</html>
